name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-apply.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: |
          set -euo pipefail
          if [ -n "${DATABASE_URL:-}" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null
            for f in supabase/migrations/*.sql; do
              echo "→ $f"
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
            done
            psql "$DATABASE_URL" -c "NOTIFY pgrst, 'reload schema';"
            exit 0
          fi
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            supabase link --project-ref roeefqpdbftlndzsvhfj
            for f in supabase/migrations/*.sql; do
              echo "→ $f"
              supabase db query --linked -f "$f"
            done
            supabase db query --linked "NOTIFY pgrst, 'reload schema';"
            exit 0
          fi
          echo "Skipping: add DATABASE_URL or SUPABASE_ACCESS_TOKEN to GitHub Actions secrets."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
